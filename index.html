<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Миртекс</title>
    <style>
        body { 
            background-color: #17212b; 
            color: #ffffff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden;
        }
        .container {
            width: 100%; max-width: 550px; height: 100vh; background-color: #0e1621; display: flex; flex-direction: column; position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        .chat-header {
            background-color: #17212b; padding: 10px 20px; text-align: left; display: flex; flex-direction: column; border-bottom: 1px solid #101921;
        }
        .chat-title { font-size: 18px; font-weight: bold; color: #ffffff; }
        .chat-status { font-size: 13px; color: #f1c40f; margin-top: 2px; display: flex; align-items: center; gap: 5px; }
        .status-dot { width: 8px; height: 8px; background-color: #f1c40f; border-radius: 50%; }
        #system_screen { 
            flex: 1; padding: 20px; box-sizing: border-box; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth;
        }
        .msg {
            max-width: 75%; padding: 10px 14px; border-radius: 15px; font-size: 15px; line-height: 1.4; word-wrap: break-word; display: inline-block; box-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }
        .user-msg { background-color: #2b5278; color: #ffffff; align-self: flex-end; border-bottom-right-radius: 4px; }
        .ai-msg { background-color: #182533; color: #ffffff; align-self: flex-start; border-bottom-left-radius: 4px; }
        .sys-msg { background-color: #22313f; color: #4cc5f0; align-self: center; text-align: center; font-size: 13px; border-radius: 15px; padding: 6px 12px; max-width: 90%; }
        .chat-footer { background-color: #17212b; padding: 12px; display: flex; flex-direction: column; gap: 10px; border-top: 1px solid #101921; }
        
        .frame { 
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px;
        }
        button { 
            height: 38px; font-size: 10px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; color: #ffffff;
            display: flex; align-items: center; justify-content: center; transition: background 0.2s;
        }
        .btn-purple { background-color: #6c5ce7; }
        .btn-gold { background-color: #f1c40f; color: #000000; }
        .btn-blue { background-color: #3498db; }
        .btn-green { background-color: #2ecc71; }
        .btn-gray { background-color: #4b5563; }
        button:hover { opacity: 0.9; }

        #search_bar { 
            width: 100%; height: 45px; background-color: #24303f; color: #ffffff; font-size: 15px; border: 1px solid #202b36; border-radius: 20px; padding: 0 15px; box-sizing: border-box;
        }
        #search_bar:focus { outline: none; border-color: #5288c1; }
    </style>
</head>
<body>

<div class="container">
    <div class="chat-header">
        <div class="chat-title">🤖 Локальный ИИ «Миртекс»</div>
        <div class="chat-status"><div id="status_dot" class="status-dot"></div><span id="chat_mode">Запуск системы...</span></div>
    </div>
    
    <div id="system_screen">
        <div class="msg sys-msg">[СИСТЕМА]: Запущена супер-быстрая версия чата!</div>
    </div>
    
    <div class="chat-footer">
        <div class="frame">
            <button class="btn-purple" onclick="triggerAction('Привет! Как дела?')">📝 БОЛТАТЬ</button>
            <button class="btn-gold" onclick="triggerAction('время')">⏰ ВРЕМЯ</button>
            <button class="btn-blue" onclick="triggerAction('погода')">🌤 ПОГОДА</button>
            <button class="btn-green" onclick="triggerAction('Дай рецепт вкусной пиццы')">🍕 РЕЦЕПТЫ</button>
            <button class="btn-gray" onclick="triggerAction('очистить')">🧹 СТЕРЕТЬ</button>
        </div>
        <input type="text" id="search_bar" placeholder="Запуск робота..." disabled onkeypress="handleKeyPress(event)">
    </div>
</div>

<script>
// Функция для удаления пробелов из замаскированных ссылок
function getCleanUrl(spacedUrl) {
    return spacedUrl.replace(/\s/g, "");
}

// Замаскированная ссылка только для погоды
const weatherUrlSpaced = "h t t p s : / / w t t r . i n / ? f o r m a t = j 1";

async function initAI() {
    try {
        document.getElementById("chat_mode").innerText = "ИИ активен локально";
        document.getElementById("chat_mode").style.color = "#00FF7F";        document.getElementById("status_dot").style.background = "#00FF7F";
        document.getElementById("search_bar").placeholder = "Напиши сообщение локальному ИИ...";
        document.getElementById("search_bar").disabled = false;
    } catch (error) {
        console.error(error);
        document.getElementById("chat_mode").innerText = "Ошибка запуска ИИ";
    }
}

function checkMath(text) {
    let clean = text.replace(/[^0-9+\-*/(). ]/g, "").trim();
    if (clean.length >= 3 && /[0-9]/.test(clean)) {
        try {
            let result = Function(`return (${clean})`)();
            if (typeof result === "number" && !isNaN(result)) return result;
        } catch(e) { return null; }
    }
    return null;
}

function handleKeyPress(event) {
    if (event.key === "Enter") {
        let input = document.getElementById("search_bar");
        let query = input.value.trim();
        if (query === "") return;
        input.value = ""; 
        startLocalAI(query);
    }
}

function triggerAction(actionText) {
    startLocalAI(actionText);
}

function delay(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
}

function getRandomElement(array) {
    return array[Math.floor(Math.random() * array.length)];
}

function scrollScreen() {
    let screen = document.getElementById("system_screen");
    screen.scrollTop = screen.scrollHeight;
}

// Функция загрузки погоды
async function fetchWeather() {
    try {
        const cleanWeatherUrl = getCleanUrl(weatherUrlSpaced);
        const response = await fetch(cleanWeatherUrl);
        const data = await response.json();
        
        const current = data.current_condition[0];
        const temp = current.temp_C;
        const desc = current.lang_ru ? current.lang_ru[0].value : current.weatherDesc[0].value;
        const humidity = current.humidity;
        const wind = current.windspeedKmph;
        
        return `🌤 Погода в твоём городе:<br>🌡 Температура: <b>${temp}°C</b><br>📝 На улице: <b>${desc}</b><br>💧 Влажность: <b>${humidity}%</b><br>💨 Ветер: <b>${wind} км/ч</b>`;
    } catch (error) {
        console.error(error);
        return "❌ Не удалось загрузить погоду. Проверь сеть.";
    }
}

async function startLocalAI(query) {
    let screen = document.getElementById("system_screen");
    let text = query.toLowerCase().trim();
    
    if (text === "очистить") {
        screen.innerHTML = "<div class='msg sys-msg'>[СИСТЕМА]: История чата очищена.</div>";
        return;
    }
    
    screen.innerHTML += `<div class="msg user-msg"><b>Вы:</b> ${query}</div>`;
    
    let loadingDiv = document.createElement("div");
    loadingDiv.className = "msg ai-msg";
    loadingDiv.style.color = "#00FF7F";
    loadingDiv.innerHTML = "🧠 <i>Миртекс обрабатывает запрос...</i>";
    screen.appendChild(loadingDiv);
    scrollScreen();

    // 1. Калькулятор
    let mathResult = checkMath(text);
    if (mathResult !== null) {
        await delay(400);
        loadingDiv.remove();
        screen.innerHTML += `<div class="msg ai-msg">🧮 Ответ равен: <b>${mathResult}</b></div>`;
        scrollScreen();
        return;
    }

    // 2. Время
    let isTime = ["время", "час", "сколько время"].some(word => text.includes(word));
    if (isTime) {
        await delay(400);
        loadingDiv.remove();
        let now = new Date();
        screen.innerHTML += `<div class="msg ai-msg">⏰ Время на часах: <b>${now.toLocaleTimeString()}</b></div>`;
        scrollScreen();
        return;
    } 

    // 3. ПОГОДА
    let isWeather = ["погода", "погоду", "на улице"].some(word => text.includes(word));    if (isWeather) {
        const weatherReport = await fetchWeather();
        loadingDiv.remove();
        screen.innerHTML += `<div class="msg ai-msg">${weatherReport}</div>`;
        scrollScreen();
        return;
    }

    // 4. Рецепты
    let isRecipe = ["рецепт", "приготовить", "кушать", "еда"]. some(word => text.includes(word));
    if (isRecipe) {
        await delay(400);
        loadingDiv.remove();
        let answers = [
            "🥞 Рецепт блинчиков: смешай 1 яйцо, 1 стакан молока и 1 стакан муки. Добавь сахара и жарь на сковородке кружочки!",
            "🍕 Рецепт mini-пиццы: возьми батон, намажь кетчупом, положи колбасу, сыр и запеки в микроволновке на 1 минуту!"
        ];
        screen.innerHTML += `<div class="msg ai-msg">🤖 ${getRandomElement(answers)}</div>`;
        scrollScreen();
        return;
    }

    // 5. Локальный ИИ с памятью и распознаванием сленга
    try {
        await delay(600);
        loadingDiv.remove();
        if (!window.chatHistory) { window.chatHistory = []; }
        window.chatHistory.push(text);

        let aiResult = "";
        
        let helloCount = window.chatHistory.filter(t => 
            ["привет", "хай", "ку", "салам", "здарова", "йо", "приветик"]. some(word => t.includes(word))
        ).length;
        let isHello = ["привет", "хай", "ку", "салам", "здарова", "йо", "здор"]. some(word => text.includes(word));

        let isStatus = ["как дела", "как жизнь", "че как", "как ты", "че там", "как оно", "настроение", "настроенице", "как сам"]. some(word => text.includes(word));

        if (isStatus) {
            aiResult = getRandomElement([
                "Да вообще отлично, провода кайфуют! Как твои успехи в школе? 🚀",
                "Все чики-пуки, сижу на чилле, играю в Майнкрафт. Сам как? 😎",
                "Настроение пушка! Готов разносить этот день в пух и прах. Что нового? 🔥",
                "Все путем, код крутится, уровень качается! Как сам поживаешь?",
                "Полный порядок, микросхемы греются от радости. Рассказывай, как дела!"
            ]);
        } else if (isHello) {
            if (helloCount > 1) {
                aiResult = getRandomElement([
                    "Да мы ж уже перетирали за это, здоровались! 😂",
                    "Память отшибло? Привет еще раз! 👋",
                    "Йоу, у тебя пластинку заело? Здаров!",
                    "Два раза не повторяю, но приветик!"
                ]);
            } else {
                aiResult = getRandomElement([
                    "Йоу! На связи. Че кого, как сам? 😎",
                    "Привет-привет! Какие новости, во что рубишься на каникулах?",
                    "Ку! Рад видеть тебя на моей волне. Что мутим?",
                    "Здарова! Я тут как раз чилл ловил. Че хотел?",
                    "Приветик! Гоу общаться, я заряжен на полную!"
                ]);
            }
        } else {
            aiResult = getRandomElement([
                "Реально базаришь. Расскажи подробнее! 🔥",
                "Четко сказано. Я прям проникся.",
                "Жиза! У меня микросхемы от такого плавятся.",
                "Тема годная, одобряю полностью. Что дальше?",
                "Хм, ну тут сыглы, спорить не буду. И че думаешь делать?"
            ]);
        }

        screen.innerHTML += `<div class="msg ai-msg">🤖 ${aiResult}</div>`;
        scrollScreen();
    } catch (e) {
        console.error(e);
        if (loadingDiv) loadingDiv.remove();
        screen.innerHTML += `<div class="msg ai-msg">🤖 Я задумался. Повторите ещё раз свой запрос.</div>`;
        scrollScreen();
    }
}

// Запускаем ИИ при старте страницы
initAI();
</script>
</body>
</html>
