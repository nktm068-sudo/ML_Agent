<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Миртекс</title>
    <!-- ПОДКЛЮЧАЕМ НАШИ СТИЛИ -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
 

<div class="container">
    <div class="chat-header">
        <div class="chat-title">🤖 Локальный ИИ «Миртекс»</div>
        <div class="chat-status"><div id="status_dot" class="status-dot"></div><span id="chat_mode">ИИ активен локально</span></div>
    </div>
    
    <div id="system_screen">
        <div class="msg sys-msg">[СИСТЕМА]: Разделённая версия чата успешно запущена!</div>
    </div>
    
    <div class="chat-footer">
        <div class="frame">
            <button class="btn-purple" onclick="triggerAction('Привет! Как дела?')">📝 БОЛТАТЬ</button>
            <button class="btn-gold" onclick="triggerAction('время')">⏰ ВРЕМЯ</button>
            <button class="btn-blue" onclick="triggerAction('погода')">🌤 ПОГОДА</button>
            <button class="btn-green" onclick="triggerAction('Дай рецепт вкусной еды')">🍕 РЕЦЕПТЫ</button>
            <button class="btn-gray" onclick="triggerAction('очистить')">🧹 СТЕРЕТЬ</button>
        </div>
        <input type="text" id="search_bar" placeholder="Напиши сообщение локальному ИИ..." onkeypress="handleKeyPress(event)">
    </div>
</div>

<!-- ПОДКЛЮЧАЕМ НАШУ ЛОГИКУ -->
<script src="jlwsaaj.js"></script>
</body>
</html>
