<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Миртекс</title>
    <style>
        body { 
            background-color: #1a1a1a; 
            color: #ffffff; 
            font-family: "Courier New", monospace; 
            text-align: center; 
            padding: 15px;
            margin: 0;
        }
        h1 { 
            color: #00FF7F; 
            font-size: 26px; 
            font-weight: bold;
            margin-bottom: 20px;
        }
        .container {
            width: 100%;
            max-width: 850px;
            margin: 0 auto;
            box-sizing: border-box;
        }
        #system_screen { 
            width: 100%; 
            height: 380px; 
            background-color: #2b2b2b; 
            color: #ffffff; 
            border: none;
            border-radius: 5px;
            padding: 15px;
            box-sizing: border-box;
            overflow-y: auto;
            text-align: left;
            white-space: pre-wrap;
            font-size: 16px; 
            line-height: 1.5;
            margin-bottom: 15px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }
        #search_bar { 
            width: 100%; 
            height: 55px; 
            background-color: #333333;
            color: #ffffff;
            font-size: 16px; 
            border: 1px solid #555555;
            border-radius: 5px; 
            padding: 0 12px; 
            box-sizing: border-box;
            margin-bottom: 15px;
        }
        #search_bar:focus {
            outline: 1px solid #00FF7F;
        }
        .frame { 
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-top: 15px; 
        }
        button { 
            height: 50px; 
            font-size: 13px; 
            font-weight: bold; 
            border: none; 
            border-radius: 5px; 
            cursor: pointer; 
            color: #ffffff;
            padding: 0 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-purple { background-color: #9370DB; }
        .btn-gold { background-color: #FFD700; color: #000000; }
        .btn-green { background-color: #32CD32; }
        .btn-gray { background-color: #555555; }
        
        button:hover {
            opacity: 0.9;
        }
        
        @media (max-width: 480px) {
            body { background-color: #111111; }
            h1 { font-size: 20px; color: #00FFFF; }
            #system_screen { height: 300px; font-size: 14px; }
            button { height: 55px; font-size: 12px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🟢 УМНАЯ ЧАТ-ПАНЕЛЬ С ИИ ПОМОЩНИКОМ</h1>
    
    <input type="text" id="search_bar" placeholder=" 🤖 Спроси у ИИ что угодно или напиши пример (например: 5 + 5)..." onkeypress="handleKeyPress(event)">
    
    <div id="system_screen"><span style="color: #00FF7F;">[СИСТЕМА]: Умный ИИ-помощник успешно запущен!</span>
<span style="color: #00FF7F;">[ИИ]: Я умею считать математику, болтать, определять время и подбирать случайные ответы.</span>

</div>
    
    <div class="frame">
        <button class="btn-purple" onclick="triggerAction('привет')">📝 ПРИВЕТСТВИЕ</button>
        <button class="btn-gold" onclick="triggerAction('время')">⏰ УЗНАТЬ ВРЕМЯ</button>
        <button class="btn-green" onclick="triggerAction('рецепт')">🥞 РЕЦЕПТЫ</button>
        <button class="btn-gray" onclick="triggerAction('очистить')">🧹 ОЧИСТИТЬ ЭКРАН</button>
    </div>
</div>

<script>
function handleKeyPress(event) {
    if (event.key === "Enter") {
        let input = document.getElementById("search_bar");
        let query = input.value.trim();
        if (query === "") return;
        
        input.value = ""; 
        askLocalAI(query);
    }
}

document.addEventListener("DOMContentLoaded", () => {
    let screen = document.getElementById("system_screen");
    let now = new Date();
    screen.innerHTML += `<span style="color: #00FFFF;">[ДАТА]: Сегодня на календаре ${now.toLocaleDateString()}</span>\n\n`;
});

function triggerAction(actionText) {
    askLocalAI(actionText);
}

function getRandomElement(array) {
    let index = Math.floor(Math.random() * array.length);
    return array[index];
}

function checkMath(text) {
    let clean = text.replace(/[^0-9+\-*/(). ]/g, "").trim();
    if (clean.length >= 3 && /[0-9]/.test(clean)) {
        try {
            let result = Function(`return (${clean})`)();
            if (typeof result === "number" && !isNaN(result)) {
                return result;
            }
        } catch(e) { return null; }
    }
    return null;
}

function askLocalAI(query) {
    let screen = document.getElementById("system_screen");
    let text = query.toLowerCase().trim();
    
    if (text === "очистить") {
        screen.innerHTML = "<span style='color: #00FF7F;'>[СИСТЕМА]: Экран успешно очищен!</span>\n\n";
        return;
    }
    
    screen.innerHTML += `<span style="color: #aaaaaa;">Вы: ${query}</span>\n`;

    if (text === "выход") {
        screen.innerHTML += "<span style='color: #ff4444;'>🔴 [ИИ]: Закрываю окно системы...</span>\n";
        setTimeout(() => { window.close(); }, 1000);
        scrollScreen();
        return;
    }

    let mathResult = checkMath(text);
    if (mathResult !== null) {
        screen.innerHTML += `<span style="color: #9370DB;">🧮 [ИИ-Калькулятор]: Я посчитал твой пример! Ответ равен: ${mathResult}</span>\n`;
        screen.innerHTML += "<span style='color: #555555;'>═</span>".repeat(40) + "\n";
        scrollScreen();
        return;
    }

    let categories = {
        time: ["время", "час", "сколько", "минут", "дата", "календарь", "день"],
        chat: ["привет", "дела", "как", "приветик", "хей", "отлично", "хорошо", "ты кто", "зовут"],
        recipe: ["рецепт", "приготовить", "кушать", "еда", "блинчики", "пицца", "коктейль", "вкусное"],
        fun: ["скучно", "пошути", "анекдот", "шутка", "смешно", "играть"]
    };

    let scores = { time: 0, chat: 0, recipe: 0, fun: 0 };
    let words = text.split(" ");

    for (let word of words) {
        for (let cat in categories) {
            if (categories[cat].some(keyword => word.includes(keyword))) {
                scores[cat]++;
            }
        }
    }

    let maxCat = "none";
    let maxScore = 0;
    for (let cat in scores) {
        if (scores[cat] > maxScore) {
            maxScore = scores[cat];
            maxCat = cat;
        }
    }

    if (maxCat === "time") {
        let now = new Date();
        let timeStr = now.toLocaleTimeString();
        let answers = [
            `⏰ [ИИ]: На моих часах прямо сейчас: ${timeStr}`,
            `⏰ [ИИ]: Точное время на твоем устройстве: ${timeStr}`,
            `⏰ [ИИ]: Локальное время системы: ${timeStr}`
        ];
        screen.innerHTML += `<span style="color: #9370DB;">${getRandomElement(answers)}</span>\n`;
    }
    else if (maxCat === "chat") {
        let answers = [
            "🤖 [ИИ]: Привет! Я твой прокачанный ИИ-помощник. Каникулы — лучшее время, как проводишь день?",
            "🤖 [ИИ]: Приветик! Я на связи и стал гораздо умнее. О чем поболтаем?",
            "🤖 [ИИ]: Рад, что всё хорошо! Я готов разбирать твои вопросы дальше."
        ];
        screen.innerHTML += `<span style="color: #9370DB;">${getRandomElement(answers)}</span>\n`;
    }
    else if (maxCat === "recipe") {
        let answers = [
            "🥞 [ИИ]: Рецепт блинчиков: смешай 1 яйцо, 1 стакан молока и 1 стакан муки. Добавь сахара и жарь кружочки!",
            "🍕 [ИИ]: Рецепт mini-пиццы: возьми батон, намажь кетчупом, положи колбасу, сыр и запеки в микроволновке на 1 минуту!",
            "🍹 [ИИ]: Рецепт коктейля: налей в стакан сок, добавь немного газировки и брось кусочек льда. Освежает в жару!"
        ];
        screen.innerHTML += `<span style="color: #9370DB;">${getRandomElement(answers)}</span>\n`;
    }
    else if (maxCat === "fun") {
        let jokes = [
            "🎈 [ИИ-Шутка]: Почему компьютеры никогда не перегреваются на каникулах? Потому что они открывают много окон!",
            "🎈 [ИИ-Шутка]: Программист ставит два стакана перед сном. Один с водой — если захочет пить. Второй пустой — если не захочет.",
            "🎈 [ИИ-Шутка]: Мой искусственный интеллект настолько мощный, что я могу ничего не делать целыми днями!"
        ];
        screen.innerHTML += `<span style="color: #9370DB;">${getRandomElement(jokes)}</span>\n`;
    }
    else {
        let unknownAnswers = [
            `❌ [ИИ]: Команду '${query}' я пока не понял. Напиши математический пример (2+2*2) или просто поздоровайся!`,
            `❌ [ИИ]: Моя база знаний еще расширяется. Попробуй спросить про время, рецепты или попроси пошутить!`,
            `❌ [ИИ]: Ой, я задумался. Нажми на одну из кнопок внизу, чтобы проверить мои базовые функции!`
        ];
        screen.innerHTML += `<span style="color: #ff4444;">${getRandomElement(unknownAnswers)}</span>\n`;
    }

    screen.innerHTML += "<span style='color: #555555;'>═</span>".repeat(40) + "\n";
    scrollScreen();
}

function scrollScreen() {
    let screen = document.getElementById("system_screen");
    screen.scrollTop = screen.scrollHeight;
}
</script>

</body>
</html>
