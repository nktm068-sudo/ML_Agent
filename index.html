<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Миртекс</title>
    <!-- Скрипт авторизации от Яндекса -->
    <script src="https://yastatic.net/s3/passport-sdk/LDTC-0.0.1/js-sdk.js"></script>
    <style>
        body { 
            background-color: #1a1a1a; 
            color: #ffffff; 
            font-family: Arial, sans-serif; 
            text-align: center; 
            padding: 15px;
            margin: 0;
        }
        h1 { 
            color: #00FF7F; 
            font-size: 26px; 
            font-weight: bold;
            margin-bottom: 20px;
        }
        .container {
            width: 100%;
            max-width: 850px;
            margin: 0 auto;
            box-sizing: border-box;
        }
        #user_profile {
            background-color: #333333;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
            display: none;
            font-weight: bold;
            color: #00FFFF;
        }
        #system_screen { 
            width: 100%; 
            height: 420px; 
            background-color: #0e1621; 
            border: none;
            border-radius: 5px;
            padding: 15px;
            box-sizing: border-box;
            overflow-y: auto;
            margin-bottom: 15px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .msg {
            max-width: 70%;
            padding: 10px 15px;
            border-radius: 12px;
            font-size: 16px;
            line-height: 1.4;
            word-wrap: break-word;
            display: inline-block;
        }
        .user-msg {
            background-color: #2b5278;
            color: #ffffff;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
            text-align: right;
        }
        .ai-msg {
            background-color: #182533;
            color: #ffffff;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
            text-align: left;
        }
        .sys-msg {
            background-color: #22313f;
            color: #00FF7F;
            align-self: center;
            text-align: center;
            font-size: 14px;
            border-radius: 20px;
        }
        #search_bar { 
            width: 100%; 
            height: 55px; 
            background-color: #333333;
            color: #ffffff;
            font-size: 16px; 
            border: 1px solid #555555;
            border-radius: 5px; 
            padding: 0 12px; 
            box-sizing: border-box;
            margin-bottom: 15px;
        }
        #search_bar:focus {
            outline: 1px solid #00FF7F;
        }
        .frame { 
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-top: 15px; 
        }
        button { 
            height: 50px; 
            font-size: 13px; 
            font-weight: bold; 
            border: none; 
            border-radius: 5px; 
            cursor: pointer; 
            color: #ffffff;
            padding: 0 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-purple { background-color: #9370DB; }
        .btn-gold { background-color: #FFD700; color: #000000; }
        .btn-green { background-color: #32CD32; }
        .btn-gray { background-color: #555555; }
        
        button:hover {
            opacity: 0.9;
        }
        
        #yandex_auth_btn {
            margin: 20px auto;
            display: inline-block;
        }
        
        @media (max-width: 480px) {
            body { background-color: #111111; }
            h1 { font-size: 20px; color: #00FFFF; }
            #system_screen { height: 320px; }
            button { height: 55px; font-size: 12px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🟢 ИИ-ПОМОЩНИК «МИРТЕКС»</h1>
    
    <div id="yandex_auth_btn"></div>
    
    <div id="user_profile">👤 Пользователь: <span id="user_name">Гость</span></div>
    
    <input type="text" id="search_bar" disabled placeholder=" 🔒 Сначала авторизуйтесь через Яндекс ID..." onkeypress="handleKeyPress(event)">
    
    <div id="system_screen">
        <div class="msg sys-msg">[СИСТЕМА]: Инициализация скрытых ресурсов... Ожидайте.</div>
    </div>
    
    <div class="frame">
        <button class="btn-purple" onclick="triggerAction('Привет! Как твои дела?')">📝 ПОБОЛТАТЬ</button>
        <button class="btn-gold" onclick="triggerAction('Который сейчас час?')">⏰ СКАЖИ ВРЕМЯ</button>
        <button class="btn-green" onclick="triggerAction('Дай рецепт вкусной пиццы')">🍕 РЕЦЕПТЫ</button>
        <button class="btn-gray" onclick="triggerAction('очистить')">🧹 ОЧИСТИТЬ ЭКРАН</button>
    </div>
</div>

<script>
// Скрытые ссылки с пробелами — защита от роботов GitHub
const geminiApiKeyUrlSpaced = "h t t p s : / / a i s t u d i o . g o o g l e . c o m / a p p / a p i k e y";
const yandexLoginUrlSpaced = "h t t p s : / / l o g i n . y a n d e x . r u / i n f o ? f o r m a t = j s o n & o a u t h _ t o k e n =";
const geminiApiBaseUrlSpaced = "h t t p s : / / g e n e r a t i v e l a n g u a g e . g o o g l e a p i s . c o m / v 1 b e t a / m o d e l s / g e m i n i - 1 . 5 - f l a s h : g e n e r a t i v e C o n t e n t ? k e y =";

// Твой личный ID Яндекса
const YANDEX_CLIENT_ID = "dff6b18bcc1f44a19894ce59344a1163";
let GEMINI_API_KEY = localStorage.getItem("gemini_key");
let currentUserName = "Пользователь";

function getCleanUrl(spacedUrl) {
    return spacedUrl.replace(/\s/g, "");
}

// Теперь функция делает только жирный текст без изменения размеров
function parseCustomText(text) {
    let html = text;
    html = html.replace(/\*\*(.*?)\*\*/g, '<strong>\$1</strong>');
    return html;
}

function startSystem() {
    let screen = document.getElementById("system_screen");
    screen.innerHTML = `<div class="msg sys-msg">[СИСТЕМА]: Модули успешно запущены!</div>`;
    screen.innerHTML += `<div class="msg sys-msg">[СИСТЕМА]: Панель заблокирована. Пожалуйста, войдите в свой Яндекс аккаунт!</div>`;
    initYandexAuth();
}

function initYandexAuth() {
    window.YaAuthSDK.init({
        client_id: YANDEX_CLIENT_ID
    }).then(sdk => {
        return sdk.addButton({
            container: 'yandex_auth_btn',
            size: 'm',
            view: 'button',
            theme: 'dark'
        });
    }).then(button => {
        button.on('success', data => {
            let cleanYandexInfoUrl = getCleanUrl(yandexLoginUrlSpaced) + data.token;
            fetch(cleanYandexInfoUrl)
                .then(res => res.json())
                .then(user => {
                    currentUserName = user.first_name || user.login;
                    document.getElementById("user_name").innerText = currentUserName;
                    document.getElementById("user_profile").style.display = "block";
                    document.getElementById("yandex_auth_btn").style.display = "none";
                    
                    let searchBar = document.getElementById("search_bar");
                    searchBar.removeAttribute("disabled");
                    searchBar.placeholder = " 🤖 Спроси у Gemini всё что угодно через ВПН...";
                    
                    let screen = document.getElementById("system_screen");
                    screen.innerHTML = `<div class="msg sys-msg">[СИСТЕМА]: Успешный вход через Яндекс! Добро пожаловать, ${currentUserName}!</div>`;
                    
                    if (currentUserName.toLowerCase() === "user123" || currentUserName.toLowerCase() === "никита") {
                        screen.innerHTML += `<div class="msg sys-msg">👑 [СИСТЕМА]: Обнаружен создатель! Активирован режим главного администратора.</div>`;
                    }

                    screen.innerHTML += `<div class="msg sys-msg">[ИИ]: Соединение с Gemini установлено. Жду вопросов.</div>`;
                    checkApiKey();
                });
        });
        button.on('error', error => {
            alert("Ошибка входа через Яндекс ID: " + JSON.stringify(error));
        });
    });
}

function checkApiKey() {
    if (!GEMINI_API_KEY) {
        GEMINI_API_KEY = prompt(`Введи свой API-ключ Gemini.\n\nЕсли у тебя его нет, включи ВПН и создай ключ на сайте:\n${getCleanUrl(geminiApiKeyUrlSpaced)}`);
        if (GEMINI_API_KEY) {
            localStorage.setItem("gemini_key", GEMINI_API_KEY.trim());
        }
    }
}

function handleKeyPress(event) {
    if (event.key === "Enter") {
        let input = document.getElementById("search_bar");
        let query = input.value.trim();
        if (query === "") return;
        
        input.value = ""; 
        askGemini(query);
    }
}

function triggerAction(actionText) {
    let searchBar = document.getElementById("search_bar");
    if (searchBar.hasAttribute("disabled")) {
        alert("Сначала нажмите кнопку Войти с Яндекс ID сверху!");
        return;
    }
    askGemini(actionText);
}

function delay(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
}

async function askGemini(query) {
    checkApiKey();
    let screen = document.getElementById("system_screen");
    let text = query.toLowerCase().trim();
    
    if (text === "очистить") {
        screen.innerHTML = "<div class='msg sys-msg'>[СИСТЕМА]: Экран успешно очищен!</div>";
        return;
    }
    
    if (!GEMINI_API_KEY) {
        screen.innerHTML += "<div class='msg ai-msg' style='color: #ff4444;'>❌ [Ошибка]: Укажите API ключ!</div>";
        return;
    }
        let userDiv = document.createElement("div");
    userDiv.className = "msg user-msg";
    userDiv.innerHTML = `<b>Вы:</b> ` + parseCustomText(query);
    screen.appendChild(userDiv);
    
    let loadingDiv = document.createElement("div");
    loadingDiv.className = "msg ai-msg";
    loadingDiv.style.color = "#00FF7F";
    loadingDiv.innerHTML = "💬 <i>ИИ печатает...</i>";
    screen.appendChild(loadingDiv);
    scrollScreen();

    if (text.includes("время") || text.includes("час") || text.includes("сколько время")) {
        await delay(5000);
        if (loadingDiv) loadingDiv.remove();
        let now = new Date();
        let timeResponse = `Время на часах: **${now.toLocaleTimeString()}**`;
        
        let aiDiv = document.createElement("div");
        aiDiv.className = "msg ai-msg";
        aiDiv.innerHTML = `🤖 ` + parseCustomText(timeResponse);
        screen.appendChild(aiDiv);
        scrollScreen();
        return;
    }

    try {
        let url = getCleanUrl(geminiApiBaseUrlSpaced) + GEMINI_API_KEY;
        
        let fetchPromise = fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                contents: [{
                    parts: [{ text: `Ты — умный ИИ-помощник на сайте Миртекс. Собеседника зовут ${currentUserName}. Используй значки ** для важного текста. Не делай текст большим. Отвечай коротко, понятно, по-доброму и только на русском языке. Вопрос: ` + query }]
                }]
            })
        });

        let [response] = await Promise.all([fetchPromise, delay(5000)]);
        let data = await response.json();
        let aiResult = "";

        if (loadingDiv) loadingDiv.remove();

        if (data && data.candidates && data.candidates[0].content && data.candidates[0].content.parts && data.candidates[0].content.parts[0]) {
            aiResult = data.candidates[0].content.parts[0].text.trim();
        } else {
            aiResult = "Ошибка ответа. Возможно, ключ Gemini не подходит. Перезагрузите страницу.";
        }

        let aiDiv = document.createElement("div");
        aiDiv.className = "msg ai-msg";
        aiDiv.innerHTML = `🤖 ` + parseCustomText(aiResult);
        screen.appendChild(aiDiv);

    } catch (error) {
        if (loadingDiv) loadingDiv.remove();
        screen.innerHTML += `<div class="msg ai-msg" style='color: #ff4444;'>❌ [Ошибка]: Включите ВПН для связи с Gemini!</div>`;
    }

    scrollScreen();
}
